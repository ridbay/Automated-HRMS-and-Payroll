name = "zenhr-api"
main = "src/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "zenhr-d1"
database_id = "00000000-0000-0000-0000-000000000000" # Placeholder, will be replaced when actually creating DB
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "zenhr-storage"
